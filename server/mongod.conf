# MongoDB Configuration for Ronnie Portfolio - Remote Access + Auth

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.5

net:
  port: 27017
  bindIp: 0.0.0.0  # Allow remote connections

security:
  authorization: enabled  # Enable authentication

processManagement:
  timeZoneInfo: /usr/share/zoneinfo
